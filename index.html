<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hedgehog Pile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAFAFA;
    color: #2C2C2C;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #title {
    font-size: 14px;
    color: #888888;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  #canvas-wrapper {
    position: relative;
    width: 500px;
    height: 700px;
    flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }

  /* Matter.js 삽입 canvas */
  #canvas-wrapper canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    border: 1px solid #F0F0F0;
    background: #FFFFFF;
  }

  /* 하단 UI: 카운터 + 리셋 */
  #ui-bottom {
    position: absolute;
    right: 12px;
    bottom: 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    z-index: 10;
    pointer-events: none;
  }

  #counter {
    font-size: 12px;
    color: #BBBBBB;
    letter-spacing: 0.3px;
    transform-origin: right center;
    transition: transform 0.2s cubic-bezier(0.36, 1.56, 0.64, 1);
  }
  #counter.pop { transform: scale(1.3); }

  #reset-btn {
    font-size: 11px;
    color: #CCCCCC;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
    font-family: inherit;
    letter-spacing: 0.3px;
    pointer-events: auto;
    transition: color 0.15s;
  }
  #reset-btn:hover { color: #888888; }

  /* 로딩 오버레이 */
  #loading-screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFFFF;
    font-size: 13px;
    color: #AAAAAA;
    letter-spacing: 0.5px;
    z-index: 50;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  #loading-screen.hidden {
    opacity: 0;
  }

  /* 반응형 */
  @media (max-width: 540px) {
    #canvas-wrapper { width: 100vw; height: calc(100vw * 1.4); }
    body { background: #FFFFFF; }
  }
  @media (max-height: 820px) {
    #canvas-wrapper {
      width: min(500px, 90vw);
      height: min(700px, calc(min(500px, 90vw) * 1.4));
    }
    #title { margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="title">Hedgehog Pile</div>

<div id="canvas-wrapper">
  <div id="ui-bottom">
    <div id="counter">쌓은 개수: 0</div>
    <button id="reset-btn">초기화</button>
  </div>
  <div id="loading-screen">Loading...</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════════════════
const W = 500, H = 700;
const WALL_T = 60, HOG_R = 40, WALL_H = 24000;

const IDLE_X       = W / 2;
const IDLE_Y_SCR   = 68;     // 화면 상단으로부터 idle 고슴도치까지 (screen px)
const IDLE_AMP_V   = 5;      // 위아래 진폭
const IDLE_AMP_H   = 3;      // 좌우 진폭
const IDLE_PERIOD_V = 2000;  // 위아래 주기 ms
const IDLE_PERIOD_H = 3000;  // 좌우 주기 ms

const STABLE_SPD = 0.10;     // 안정 판정 속도 임계값
const STABLE_MS  = 500;      // 안정 유지 시간
const CAM_LERP     = 0.02;       // 카메라 보간 계수 (낮을수록 부드러움)
const CAM_PAD      = H * 0.40;   // 최고점을 화면 40% 지점에 배치
const CAM_DEADZONE = H * 0.30;   // 최고점이 이 이내면 카메라 고정 (출렁임 방지)

// ═══════════════════════════════════════════════════════════
// Matter.js 셋업 (enableSleeping → 많이 쌓여도 성능 유지)
// ═══════════════════════════════════════════════════════════
const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

const wrapper   = document.getElementById('canvas-wrapper');
const counterEl = document.getElementById('counter');
const resetBtn  = document.getElementById('reset-btn');

const engine = Engine.create({ gravity: { y: 1 }, enableSleeping: true });
const world  = engine.world;

const render = Render.create({
  element: wrapper,
  engine:  engine,
  options: {
    width:      W,
    height:     H,
    background: '#FFFFFF',
    wireframes: false,
  }
});

// ── 경계 생성 ─────────────────────────────────────────────
// 벽 두께/위치: Matter.js 물리 world 좌표 기준 (W=500, H=700 고정)
// 벽 높이를 30000으로 크게 잡아 바닥(y=H+25)까지 충분히 커버하고
// 카메라가 위로 올라갈 때도 막힘 없게 함
// 이전 코드 버그: WALL_H=24000, 중심 y = H/2 - WALL_H/2 = -11650
//   → 벽 하단 y = -11650 + 12000 = 350  ← 바닥(730)까지 못 닿음!
// 수정: 중심을 y=0(월드 원점)으로, 높이 30000 → 벽 하단 y=15000 > 730

const WALL_THICK = 50;
const WALL_TALL  = 30000;   // 상하 충분히 긴 벽

let boundaries = [];

function buildBoundaries() {
  // 기존 경계 제거
  for (const b of boundaries) World.remove(world, b);

  // 바닥: 캔버스 하단 바로 아래, 폭은 캔버스보다 넉넉히
  const ground = Bodies.rectangle(
    W / 2, H + WALL_THICK / 2,
    W + WALL_THICK * 2, WALL_THICK,
    { isStatic:true, label:'ground', render:{fillStyle:'transparent'} }
  );
  // 좌벽: x = -25 (캔버스 왼쪽 밖), 중심 y = 0, 매우 높게
  const wallL = Bodies.rectangle(
    -WALL_THICK / 2, 0,
    WALL_THICK, WALL_TALL,
    { isStatic:true, label:'wall-l', render:{fillStyle:'transparent'} }
  );
  // 우벽: x = W + 25 (캔버스 오른쪽 밖)
  const wallR = Bodies.rectangle(
    W + WALL_THICK / 2, 0,
    WALL_THICK, WALL_TALL,
    { isStatic:true, label:'wall-r', render:{fillStyle:'transparent'} }
  );

  boundaries = [ground, wallL, wallR];
  World.add(world, boundaries);
}

buildBoundaries();

// 캔버스 해상도 명시 (CSS display size와 독립적으로 유지)
render.canvas.width  = W;
render.canvas.height = H;

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ═══════════════════════════════════════════════════════════
// 이미지 시스템 — 7종 프리로드
// ═══════════════════════════════════════════════════════════
const IMAGE_NAMES = ['wh', 'ww', 'wa', 'we', 'wr', 'wt', 'ws'];
const hedgehogImages = {};   // { 'wh': HTMLImageElement, ... }
let imagesLoaded = false;
let currentWaitingImage = null;   // 현재 대기 중인 고슴도치 이미지

const loadingScreen = document.getElementById('loading-screen');

function getRandomImage() {
  const name = IMAGE_NAMES[Math.floor(Math.random() * IMAGE_NAMES.length)];
  return hedgehogImages[name] ?? hedgehogImages[IMAGE_NAMES[0]] ?? null;
}

async function loadImages() {
  const promises = IMAGE_NAMES.map(name => new Promise(resolve => {
    const img = new Image();
    img.onload  = () => { hedgehogImages[name] = img; resolve(); };
    img.onerror = () => { console.warn(`${name}.png 로드 실패 — 스킵`); resolve(); };
    img.src = `${name}.png`;
  }));
  await Promise.all(promises);
  imagesLoaded = true;
  currentWaitingImage = getRandomImage();
  // 로딩 완료 → 오버레이 숨김
  loadingScreen.classList.add('hidden');
  setTimeout(() => loadingScreen.remove(), 400);
}

loadImages();

// ═══════════════════════════════════════════════════════════
// 카메라
// ═══════════════════════════════════════════════════════════
// camY: 화면 최상단이 대응하는 world y 값 (0 이하)
let camY = 0, camTargetY = 0;

// ═══════════════════════════════════════════════════════════
// 좌표 변환
// ═══════════════════════════════════════════════════════════
// 마우스/터치 클라이언트 좌표 → world 좌표
function clientToWorld(clientX, clientY) {
  const rect = render.canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height) + camY,
  };
}

// ═══════════════════════════════════════════════════════════
// 고슴도치 그리기 (screen 좌표 기준)
// img: 사용할 이미지 (null이면 폴백 원)
// ═══════════════════════════════════════════════════════════
function drawHedgehog(ctx, sx, sy, angle, r, alpha = 1, scale = 1, img = null) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(sx, sy);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  const image = img ?? currentWaitingImage;
  if (image && image.complete && image.naturalWidth > 0) {
    ctx.drawImage(image, -r, -r, r * 2, r * 2);
  } else {
    // 폴백: 살구색 원 (로딩 전 또는 이미지 실패 시)
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#E8B4A0';
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 게임 상태
// ═══════════════════════════════════════════════════════════
const hedgehogs = []; // { body, stableTimer, counted }
let stableCount = 0;
let latestBody  = null;

let isDragging = false;
let isDropped  = false;
let dragX = IDLE_X, dragY = 0;  // world 좌표
let idleAlpha = 1;
let idleTime  = 0;
let lastTs    = 0;

// 첫 드롭 가이드 텍스트 alpha (처음 1→0 으로 fade)
let guideAlpha = 1;

// ── idle 고슴도치 화면 위치 (screen y 기준) ───────────────
function idleScreenX() {
  return IDLE_X + Math.sin((idleTime / IDLE_PERIOD_H) * Math.PI * 2) * IDLE_AMP_H;
}
function idleScreenY() {
  return IDLE_Y_SCR + Math.sin((idleTime / IDLE_PERIOD_V) * Math.PI * 2) * IDLE_AMP_V;
}
// idle 고슴도치 world y (카메라 반영)
function idleWorldY() { return camY + idleScreenY(); }

// ═══════════════════════════════════════════════════════════
// Hit test (world 좌표 입력)
// ═══════════════════════════════════════════════════════════
function hitIdle(wx, wy) {
  if (isDropped || isDragging) return false;
  return Math.hypot(wx - IDLE_X, wy - idleWorldY()) <= HOG_R * 1.2;
}

// ═══════════════════════════════════════════════════════════
// 충격파
// ═══════════════════════════════════════════════════════════
const pulses = []; // { wx, wy, startTs }
const PULSE_MS = 300, PULSE_MAXR = 60;

function spawnPulse(wx, wy) {
  pulses.push({ wx, wy, startTs: performance.now() });
}

function drawPulses(ctx, now) {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const t = (now - p.startTs) / PULSE_MS;
    if (t >= 1) { pulses.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = (1 - t) * 0.55;
    ctx.strokeStyle = '#E8B4A0';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.arc(p.wx, p.wy - camY, t * PULSE_MAXR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// 배경 가이드라인
// ═══════════════════════════════════════════════════════════
function drawGuideLines(ctx) {
  const step = 100;
  const firstLine = Math.floor(camY / step) * step;
  ctx.save();
  ctx.strokeStyle = '#F5F5F5';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 6]);
  for (let wy = firstLine; wy <= camY + H + step; wy += step) {
    const sy = wy - camY;
    if (sy < -1 || sy > H + 1) continue;
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 드롭 → Body 생성
// ═══════════════════════════════════════════════════════════
let firstDrop = true;

function dropHedgehog(wx, wy) {
  const angle  = (Math.random() - 0.5) * 0.6;
  const angVel = (Math.random() - 0.5) * 0.1;

  const body = Bodies.circle(wx, wy, HOG_R, {
    restitution:    0.4,
    friction:       0.6,
    density:        0.002,
    sleepThreshold: 60,
    label:          'hedgehog',
    render:         { fillStyle:'transparent', strokeStyle:'transparent', lineWidth:0 },
    angle:          angle,
  });
  Body.setAngularVelocity(body, angVel);
  Body.setVelocity(body, { x: 0, y: 1 });

  World.add(world, body);
  // isFalling=true인 동안 카메라 계산 대상에서 제외
  // image: 이 hedgehog에 고정된 이미지 (드롭 순간 확정)
  hedgehogs.push({ body, stableTimer: 0, counted: false, isFalling: true, image: currentWaitingImage });
  latestBody = body;

  // 1.5초 후 또는 sleeping 감지 시 isFalling 해제
  // (setTimeout은 최대 유효 시간 보장용 — sleeping 감지는 afterRender에서 처리)
  setTimeout(() => {
    const entry = hedgehogs.find(h => h.body === body);
    if (entry) entry.isFalling = false;
  }, 1500);

  isDragging = false;
  isDropped  = true;

  // 가이드 텍스트 첫 드롭 시 fade out
  if (firstDrop) {
    firstDrop = false;
    if (guideAlpha > 0) {
      const t0 = performance.now();
      (function fadeGuide(ts) {
        guideAlpha = Math.max(0, 1 - (ts - t0) / 300);
        if (guideAlpha > 0) requestAnimationFrame(fadeGuide);
      })(performance.now());
    }
  }

  // 0.5초 후 대기 고슴도치 재등장 (fade in 200ms) + 새 랜덤 이미지 선택
  setTimeout(() => {
    currentWaitingImage = getRandomImage();   // 다음 hedgehog 표정 결정
    idleAlpha = 0;
    isDropped = false;
    const t0 = performance.now();
    (function fadeIn(ts) {
      idleAlpha = Math.min((ts - t0) / 200, 1);
      if (idleAlpha < 1) requestAnimationFrame(fadeIn);
    })(performance.now());
  }, 500);
}

// ═══════════════════════════════════════════════════════════
// 입력
// ═══════════════════════════════════════════════════════════
const canvas = render.canvas;

// ── 마우스 ────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (isDropped) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x; dragY = y;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  if (isDragging || isDropped) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  canvas.style.cursor = hitIdle(x, y) ? 'grab' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  if (!isDragging) canvas.style.cursor = 'default';
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dragX = x; dragY = y;
});

window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dropHedgehog(x, y);
  canvas.style.cursor = 'default';
});

// ── 터치 ──────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  if (isDropped) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x; dragY = y;
  }
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dragX = x; dragY = y;
}, { passive: false });

window.addEventListener('touchend', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dropHedgehog(x, y);
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// 충돌 → 충격파 + 미세 흔들림
// ═══════════════════════════════════════════════════════════
Events.on(engine, 'collisionStart', event => {
  for (const { bodyA, bodyB } of event.pairs) {
    if (bodyA !== latestBody && bodyB !== latestBody) continue;
    const cx = (bodyA.position.x + bodyB.position.x) / 2;
    const cy = (bodyA.position.y + bodyB.position.y) / 2;
    spawnPulse(cx, cy);
    const other = bodyA === latestBody ? bodyB : bodyA;
    if (!other.isStatic) {
      Body.applyForce(other, other.position, {
        x: (Math.random() - 0.5) * 0.002,
        y: (Math.random() - 0.5) * 0.001,
      });
    }
  }
});

// ═══════════════════════════════════════════════════════════
// 리사이즈 대응
// ─ 물리 world 좌표(W×H)는 고정이지만, 창 크기 변경 시
//   경계를 재확인하기 위해 buildBoundaries() 재호출
// ═══════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  // 캔버스 해상도 유지 (CSS display size 변경에 영향 안 받게)
  render.canvas.width  = W;
  render.canvas.height = H;
  // 경계는 W×H 고정값 기준이므로 위치는 바뀌지 않지만
  // 예비로 재생성해 sleeping body가 올바른 충돌면을 가지도록 함
  buildBoundaries();
});

// ═══════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════
function resetAll() {
  for (const { body } of hedgehogs) World.remove(world, body);
  hedgehogs.length = 0;
  pulses.length    = 0;
  stableCount      = 0;
  counterEl.textContent = '쌓은 개수: 0';
  camY = 0; camTargetY = 0;
  latestBody  = null;
  isDragging  = false;
  isDropped   = false;
  idleAlpha   = 1;
  idleTime    = 0;
}
resetBtn.addEventListener('click', resetAll);

// ═══════════════════════════════════════════════════════════
// afterRender — 메인 그리기 루프
// ═══════════════════════════════════════════════════════════
Events.on(render, 'afterRender', () => {
  const ctx = render.context;
  const now = performance.now();
  const dt  = lastTs > 0 ? Math.min(now - lastTs, 50) : 0;
  lastTs    = now;

  // idle 타이머
  if (!isDropped && !isDragging) idleTime += dt;

  // ── 카메라 업데이트 ──────────────────────────────────────
  // 규칙:
  //  1. isFalling=true 인 body는 제외 (떨어지는 중 출렁임 방지)
  //  2. sleeping 상태이거나 거의 정지한 body만 후보
  //  3. 카메라는 위로만 이동 (camTargetY는 더 작은 값으로만 갱신)
  //  4. 데드존: 최고점이 화면 상단 CAM_DEADZONE 이내면 이동 안 함

  // isFalling 자동 해제: sleeping 감지
  for (const entry of hedgehogs) {
    if (entry.isFalling && entry.body.isSleeping) {
      entry.isFalling = false;
    }
  }

  // 정지 hedgehog 중 가장 높은 y 탐색
  let highestStableY = H;
  let hasStable = false;
  for (const { body, isFalling } of hedgehogs) {
    if (isFalling) continue;
    const vx = Math.abs(body.velocity.x);
    const vy = Math.abs(body.velocity.y);
    const isStill = body.isSleeping || (vx < 0.15 && vy < 0.15);
    if (!isStill) continue;
    if (body.position.y < highestStableY) {
      highestStableY = body.position.y;
      hasStable = true;
    }
  }

  if (hasStable) {
    // 최고점이 화면 상단 CAM_DEADZONE 지점을 넘어섰을 때만 카메라 이동
    const screenY = highestStableY - camY;          // 현재 화면에서의 y
    if (screenY < CAM_DEADZONE) {
      const newTarget = Math.min(0, highestStableY - CAM_PAD);
      // 위로만 이동: 더 작은 값(더 위)일 때만 갱신
      if (newTarget < camTargetY) camTargetY = newTarget;
    }
  }

  camY += (camTargetY - camY) * CAM_LERP;

  // ── 안정도 체크 → 카운터 ────────────────────────────────
  for (const entry of hedgehogs) {
    if (entry.counted) continue;
    const spd = Math.hypot(entry.body.velocity.x, entry.body.velocity.y);
    const asp = Math.abs(entry.body.angularVelocity);
    if (spd < STABLE_SPD && asp < STABLE_SPD * 0.5) {
      entry.stableTimer += dt;
      if (entry.stableTimer >= STABLE_MS) {
        entry.counted = true;
        stableCount++;
        counterEl.textContent = `쌓은 개수: ${stableCount}`;
        // 카운터 팝 애니메이션
        counterEl.classList.remove('pop');
        void counterEl.offsetWidth;
        counterEl.classList.add('pop');
        setTimeout(() => counterEl.classList.remove('pop'), 200);
      }
    } else {
      entry.stableTimer = 0;
    }
  }

  // ── 경계 이탈 안전장치 ──────────────────────────────────
  // 벽을 뚫고 나간 body가 있으면 제거 (이론상 없어야 하지만 예비 처리)
  for (let i = hedgehogs.length - 1; i >= 0; i--) {
    const b = hedgehogs[i].body;
    const oob =
      b.position.x < -(HOG_R * 3) ||
      b.position.x >  W + HOG_R * 3 ||
      b.position.y >  H + 400;      // 바닥 훨씬 아래까지 떨어진 경우
    if (oob) {
      console.warn('[boundary] escaped body removed at', b.position.x.toFixed(1), b.position.y.toFixed(1));
      World.remove(world, b);
      if (hedgehogs[i].counted) stableCount = Math.max(0, stableCount - 1);
      hedgehogs.splice(i, 1);
      counterEl.textContent = `쌓은 개수: ${stableCount}`;
    }
  }

  // ── 가이드라인 ───────────────────────────────────────────
  drawGuideLines(ctx);

  // ── 떨어진 고슴도치 (world → screen, 각자 고정된 이미지 사용) ──
  for (const { body, image } of hedgehogs) {
    drawHedgehog(ctx, body.position.x, body.position.y - camY, body.angle, HOG_R, 1, 1, image);
  }

  // ── 충격파 ──────────────────────────────────────────────
  drawPulses(ctx, now);

  // ── 대기 / 드래그 고슴도치 (currentWaitingImage 사용) ──
  if (!isDropped) {
    if (isDragging) {
      // 드래그: world → screen
      ctx.save();
      ctx.shadowColor   = 'rgba(0,0,0,0.10)';
      ctx.shadowBlur    = 18;
      ctx.shadowOffsetY = 7;
      drawHedgehog(ctx, dragX, dragY - camY, 0, HOG_R, idleAlpha, 1.05, currentWaitingImage);
      ctx.restore();
    } else {
      // idle: 화면 고정 위치
      const isx = idleScreenX();
      const isy = idleScreenY();
      drawHedgehog(ctx, isx, isy, 0, HOG_R, idleAlpha, 1.0, currentWaitingImage);

      // grab 힌트 점선 링
      if (idleAlpha > 0.4) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(isx, isy, HOG_R + 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(232,180,160,0.38)';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([4, 6]);
        ctx.globalAlpha = idleAlpha;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // 가이드 텍스트 (첫 드롭 전)
      if (guideAlpha > 0) {
        ctx.save();
        ctx.globalAlpha   = guideAlpha * idleAlpha;
        ctx.fillStyle     = '#AAAAAA';
        ctx.font          = '13px system-ui,-apple-system,sans-serif';
        ctx.textAlign     = 'left';
        ctx.textBaseline  = 'middle';
        ctx.fillText('드래그해서 놓아주세요', isx + HOG_R + 10, isy);
        ctx.restore();
      }
    }
  }
});
</script>
</body>
</html>
