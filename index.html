<style>
/* ── 리셋 & 기반 ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #FAFAFA;
  color: #2C2C2C;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
}

/* ── 앱 컨테이너 ─────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── 상단 점수 바 ─────────────────────────────────────── */
#top-bar {
  width: 400px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 0 6px 10px;
}
.score-block { display: flex; flex-direction: column; gap: 2px; }
.score-block.right { align-items: flex-end; }
.score-label {
  font-size: 10px;
  color: #AAAAAA;
  letter-spacing: 1.5px;
  font-weight: 600;
}
#score-display {
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #2C2C2C;
  line-height: 1;
  transition: transform 0.25s cubic-bezier(0.36,1.56,0.64,1);
}
#score-display.pop { transform: scale(1.3); }
#best-display {
  font-size: 22px;
  font-weight: 700;
  color: #AAAAAA;
  line-height: 1;
}

/* ── 캔버스 래퍼 ─────────────────────────────────────── */
#canvas-wrapper {
  position: relative;
  width: 400px;
  height: 600px;
  border: 1px solid #DDDDDD;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  cursor: none;     /* 마우스 커서 숨김 — 고슴도치가 따라감 */
}
#canvas-wrapper canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
}

/* ── 하단 NEXT 바 ─────────────────────────────────────── */
#bottom-bar {
  width: 400px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 10px 8px 0;
  gap: 8px;
}
#next-label {
  font-size: 10px;
  color: #AAAAAA;
  letter-spacing: 1.5px;
  font-weight: 600;
}
#next-canvas {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: #EEEEEE;
}

/* ── 공용 패널 (시작/게임오버) ───────────────────────── */
.panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 50;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(2px);
  border-radius: 8px;
}
.panel.visible { opacity: 1; pointer-events: auto; }

/* 시작 화면 */
#start-title {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #2C2C2C;
}
#start-sub {
  font-size: 14px;
  color: #888888;
  text-align: center;
  line-height: 1.6;
}

/* 게임오버 화면 */
#modal-new-best {
  font-size: 13px;
  font-weight: 700;
  color: #E8B4A0;
  letter-spacing: 2px;
}
#modal-game-over {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 1px;
  color: #2C2C2C;
}
#modal-final-score { font-size: 22px; color: #444444; }
#modal-best-score  { font-size: 15px; color: #AAAAAA; }

/* 공용 버튼 */
.action-btn {
  padding: 12px 44px;

}
.action-btn:hover  { opacity: 0.88; }

/* ── 반응형 ──────────────────────────────────────────── */
@media (max-width: 440px) {
  #canvas-wrapper { width: 100vw; height: calc(100vw * 1.5); border-radius: 0; border-left: none; border-right: none; }
  #top-bar, #bottom-bar { width: 100vw; }
}
@media (max-height: 760px) {
  #score-display { font-size: 26px; }
  #top-bar { padding-bottom: 6px; }
  #bottom-bar { padding-top: 6px; }
}
</style>

<body>
<div id="app">

  <!-- 상단 점수 바 -->
  <div id="top-bar">
    <div class="score-block">
      <div class="score-label">SCORE</div>
      <div id="score-display">0</div>
    </div>
    <div class="score-block right">
      <div class="score-label">BEST</div>
      <div id="best-display">0</div>
    </div>
  </div>

  <!-- 게임 캔버스 영역 -->
  <div id="canvas-wrapper">

    <!-- 시작 화면 -->
    <div id="start-screen" class="panel visible">
      <div id="start-title">Hedgehog Merge</div>
      <div id="start-sub">같은 고슴도치를 합쳐서<br>큰 고슴도치를 만드세요</div>
      <button id="start-btn" class="action-btn">시작</button>
    </div>

    <!-- 게임 오버 -->
    <div id="game-over-modal" class="panel">
      <div id="modal-new-best">NEW BEST!</div>
      <div id="modal-game-over">GAME OVER</div>
      <div id="modal-final-score">최종 점수: 0</div>
      <div id="modal-best-score">최고 점수: 0</div>
      <button id="restart-btn" class="action-btn">다시 시작</button>
    </div>

  </div>

  <!-- 하단 NEXT 미리보기 -->
  <div id="bottom-bar">
    <div id="next-label">NEXT</div>
    <canvas id="next-canvas" width="52" height="52"></canvas>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 상수 & 단계 정의
// ═══════════════════════════════════════════════════════════
const W = 400, H = 600;
const WALL_T    = 50;
const WALL_TALL = 30000;
const DROP_Y    = 44;         // 대기 고슴도치 중심 y (screen)
const DANGER_Y  = 100;        // 위험선 y
const MAX_DROP_TIER  = 4;     // 드롭 가능 최대 단계
const DROP_COOLDOWN  = 700;   // 드롭 후 쿨다운 ms
const DANGER_LIMIT   = 3000;  // 게임오버 위험 지속 시간 ms

const TIERS = [
  { tier:1, img:'wh.png', r:22,  score:1  },
  { tier:2, img:'ww.png', r:30,  score:3  },
  { tier:3, img:'wa.png', r:40,  score:6  },
  { tier:4, img:'we.png', r:52,  score:10 },
  { tier:5, img:'wr.png', r:65,  score:15 },
  { tier:6, img:'wt.png', r:80,  score:21 },
  { tier:7, img:'ws.png', r:100, score:28 },
];

// ═══════════════════════════════════════════════════════════
// 이미지 프리로드
// ═══════════════════════════════════════════════════════════
const IMG = {};   // { 'wh.png': HTMLImageElement, ... }

async function preloadImages() {
  await Promise.all(TIERS.map(t => new Promise(res => {
    const img = new Image();
    img.onload = img.onerror = res;
    img.src = t.img;
    IMG[t.img] = img;
  })));
}

function getImg(tierNum) {
  const src = TIERS[tierNum - 1]?.img;
  return src ? IMG[src] : null;
}

// ═══════════════════════════════════════════════════════════
// Matter.js 셋업
// ═══════════════════════════════════════════════════════════
const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

const wrapper = document.getElementById('canvas-wrapper');

const engine = Engine.create({ enableSleeping: true, gravity: { x:0, y:1 } });
const world  = engine.world;

const render = Render.create({
  element: wrapper,
  engine,
  options: { width:W, height:H, background:'#F5F5F0', wireframes:false }
});

// 경계 (바닥 + 좌우 벽)
World.add(world, [
  Bodies.rectangle(W/2, H+WALL_T/2, W+WALL_T*2, WALL_T,
    { isStatic:true, label:'ground', render:{fillStyle:'transparent'} }),
  Bodies.rectangle(-WALL_T/2, 0, WALL_T, WALL_TALL,
    { isStatic:true, label:'wall-l', render:{fillStyle:'transparent'} }),
  Bodies.rectangle(W+WALL_T/2, 0, WALL_T, WALL_TALL,
    { isStatic:true, label:'wall-r', render:{fillStyle:'transparent'} }),
]);

render.canvas.width  = W;
render.canvas.height = H;
Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ═══════════════════════════════════════════════════════════
// 게임 상태
// ═══════════════════════════════════════════════════════════
let score       = 0;
let best        = parseInt(localStorage.getItem('hedgehogMergeBest') || '0');
let gameStarted = false;
let isGameOver  = false;
let isDropping  = false;

let cursorX     = W / 2;          // 대기 고슴도치 x (screen 좌표)
let currentTier = 1;              // 지금 들고 있는 단계
let nextTier    = 1;              // 다음에 나올 단계

let hedgehogBodies = [];          // 활성 Matter.js body 배열
let pendingMerges  = [];          // 프레임 끝에 처리할 합치기 대기열

let dangerMs    = 0;              // 위험 상태 누적 ms
let lastTs      = 0;

// 이펙트
let mergeRings  = [];    // { x, y, startTs }
let particles   = [];    // { x, y, vx, vy, startTs }
let scoreFloats = [];    // { x, y, text, startTs }

// DOM refs
const scoreEl  = document.getElementById('score-display');
const bestEl   = document.getElementById('best-display');
const nextCvs  = document.getElementById('next-canvas');
const nextCtx2 = nextCvs.getContext('2d');
const startScr = document.getElementById('start-screen');
const goModal  = document.getElementById('game-over-modal');

// ═══════════════════════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════════════════════
function randTier() { return Math.ceil(Math.random() * MAX_DROP_TIER); }

function clampX(tier) {
  const r = TIERS[tier - 1].r;
  return Math.max(r, Math.min(W - r, cursorX));
}

function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

function clientToWorldX(clientX) {
  const rect = render.canvas.getBoundingClientRect();
  return (clientX - rect.left) * (W / rect.width);
}

// ═══════════════════════════════════════════════════════════
// Body 생성
// ═══════════════════════════════════════════════════════════
function makeBody(x, y, tier) {
  const { r } = TIERS[tier - 1];
  const body = Bodies.circle(x, y, r, {
    restitution: 0.2, friction: 0.5, density: 0.001,
    frictionAir: 0.01, sleepThreshold: 60, label: 'hedgehog',
    render: { fillStyle:'transparent', strokeStyle:'transparent', lineWidth:0 },
  });
  body.tier    = tier;
  body.merging = false;
  return body;
}

// ═══════════════════════════════════════════════════════════
// UI 갱신
// ═══════════════════════════════════════════════════════════
function updateScore() {
  scoreEl.textContent = score;
  bestEl.textContent  = Math.max(score, best);
}

function popScore() {
  scoreEl.classList.remove('pop');
  void scoreEl.offsetWidth;
  scoreEl.classList.add('pop');
  setTimeout(() => scoreEl.classList.remove('pop'), 250);
}

function drawNextPreview() {
  nextCtx2.clearRect(0, 0, 52, 52);
  const data = TIERS[nextTier - 1];
  const img  = getImg(nextTier);
  if (!img || !img.complete || !img.naturalWidth) return;
  const r = Math.min(data.r * 0.6, 22);
  nextCtx2.save();
  nextCtx2.beginPath();
  nextCtx2.arc(26, 26, 24, 0, Math.PI * 2);
  nextCtx2.clip();
  nextCtx2.drawImage(img, 26-r, 26-r, r*2, r*2);
  nextCtx2.restore();
}

// ═══════════════════════════════════════════════════════════
// 드롭
// ═══════════════════════════════════════════════════════════
function drop() {
  if (!gameStarted || isGameOver || isDropping) return;
  isDropping = true;

  const tier = currentTier;
  const x    = clampX(tier);
  const body = makeBody(x, DROP_Y, tier);
  World.add(world, body);
  hedgehogBodies.push(body);

  playDropSound();   // "퐁"

  currentTier = nextTier;
  nextTier    = randTier();
  drawNextPreview();

  setTimeout(() => { isDropping = false; }, DROP_COOLDOWN);
}

// ═══════════════════════════════════════════════════════════
// 합치기 로직 (충돌 이벤트 → 큐 → afterRender에서 처리)
// ═══════════════════════════════════════════════════════════
Events.on(engine, 'collisionStart', event => {
  for (const { bodyA, bodyB } of event.pairs) {
    // ── 합치기 큐 ────────────────────────────────────────
    if (
      bodyA.tier && bodyB.tier &&
      bodyA.tier === bodyB.tier &&
      !bodyA.merging && !bodyB.merging
    ) {
      bodyA.merging = true;
      bodyB.merging = true;
      pendingMerges.push({ bodyA, bodyB, tier: bodyA.tier });
    }

    // ── 충돌 효과음 "톡" ─────────────────────────────────
    // 상대 속도로 충돌 강도 계산, 너무 느린 충돌(슬라이딩)은 무시
    const relV  = Matter.Vector.sub(bodyA.velocity, bodyB.velocity);
    const speed = Matter.Vector.magnitude(relV);
    if (speed > 1.5) {
      const intensity = Math.min(speed / 5, 1);
      playCollisionSound(intensity);   // "톡"
    }
  }
});

function processMerges() {
  while (pendingMerges.length) {
    const { bodyA, bodyB, tier } = pendingMerges.shift();

    const midX = (bodyA.position.x + bodyB.position.x) / 2;
    const midY = (bodyA.position.y + bodyB.position.y) / 2;

    World.remove(world, bodyA);
    World.remove(world, bodyB);
    hedgehogBodies = hedgehogBodies.filter(b => b !== bodyA && b !== bodyB);

    const nextT = tier + 1;
    let gained  = 0;

    if (nextT > TIERS.length) {
      // 최고 단계 합치기 → 보너스
      gained = 100;
      spawnEffects(midX, midY);
    } else {
      const newBody    = makeBody(midX, midY, nextT);
      newBody._spawnTs = performance.now();
      World.add(world, newBody);
      hedgehogBodies.push(newBody);
      gained = TIERS[nextT - 1].score;
      spawnEffects(midX, midY);
    }

    score += gained;
    if (score > best) {
      best = score;
      localStorage.setItem('hedgehogMergeBest', best);
    }
    updateScore();
    popScore();
    scoreFloats.push({ x: midX, y: midY, text: `+${gained}`, startTs: performance.now() });
  }
}

// ═══════════════════════════════════════════════════════════
// Web Audio API — 효과음
// ═══════════════════════════════════════════════════════════
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

// 브라우저 자동재생 정책: 첫 인터랙션에서만 초기화
document.addEventListener('mousedown', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

// "퐁" — 떨어뜨리는 순간
function playDropSound() {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now  = audioCtx.currentTime;
  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.10);

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.08, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.15);
}

// "톡" — 충돌 시 (디바운싱: 30ms 이내 중복 무시)
let _lastCollisionTs = 0;

function playCollisionSound(intensity = 1) {
  const now = performance.now();
  if (now - _lastCollisionTs < 30) return;
  _lastCollisionTs = now;

  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const t        = audioCtx.currentTime;
  const osc      = audioCtx.createOscillator();
  const gain     = audioCtx.createGain();
  const baseFreq = 280 + Math.random() * 120;   // 280~400 Hz, 매번 살짝 다르게

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(baseFreq, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, t + 0.06);

  const vol = Math.min(0.05 * intensity, 0.06);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);

  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + 0.09);
}

// ═══════════════════════════════════════════════════════════
// 이펙트 생성 & 그리기
// ═══════════════════════════════════════════════════════════
function spawnEffects(x, y) {
  mergeRings.push({ x, y, startTs: performance.now() });
  for (let i = 0; i < 8; i++) {
    const a  = (i / 8) * Math.PI * 2;
    const sp = 140 + Math.random() * 60;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, startTs: performance.now() });
  }
}

function drawEffects(ctx, now) {
  // 합치기 링
  for (let i = mergeRings.length - 1; i >= 0; i--) {
    const e = mergeRings[i];
    const t = (now - e.startTs) / 320;
    if (t >= 1) { mergeRings.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = (1 - t) * 0.75;
    ctx.strokeStyle = '#E8B4A0';
    ctx.lineWidth   = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, t * 80, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  // 파티클
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const t = (now - p.startTs) / 220;
    if (t >= 1) { particles.splice(i, 1); continue; }
    const px = p.x + p.vx * t * 0.22;
    const py = p.y + p.vy * t * 0.22;
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle   = '#E8B4A0';
    ctx.beginPath();
    ctx.arc(px, py, 3.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // 점수 플로트
  for (let i = scoreFloats.length - 1; i >= 0; i--) {
    const f = scoreFloats[i];
    const t = (now - f.startTs) / 520;
    if (t >= 1) { scoreFloats.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = 1 - t;
    ctx.fillStyle   = '#E8B4A0';
    ctx.font        = 'bold 14px system-ui, sans-serif';
    ctx.textAlign   = 'center';
    ctx.fillText(f.text, f.x, f.y - t * 44);
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// 고슴도치 body 그리기
// ═══════════════════════════════════════════════════════════
function drawBody(ctx, body, now) {
  const data  = TIERS[body.tier - 1];
  const img   = getImg(body.tier);
  const r     = data.r;
  const { x, y } = body.position;

  // 스폰 스케일 애니메이션
  let sc = 1;
  if (body._spawnTs) {
    const t = Math.min((now - body._spawnTs) / 220, 1);
    sc = 0.3 + 0.7 * easeOutCubic(t);
    if (t >= 1) delete body._spawnTs;
  }

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(body.angle);
  ctx.scale(sc, sc);

  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, -r, -r, r*2, r*2);
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#E8B4A0';
    ctx.fill();
  }

  // 위험 상태 빨간 링
  if (body._inDanger && dangerMs > 600) {
    ctx.strokeStyle = `rgba(220,80,80,${0.4 + 0.4 * Math.sin(now / 200)})`;
    ctx.lineWidth   = 2.5 / sc;
    ctx.beginPath();
    ctx.arc(0, 0, r + 2, 0, Math.PI * 2);
    ctx.stroke();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 위험 판정
// ═══════════════════════════════════════════════════════════
function checkDanger(dt) {
  if (!gameStarted || isGameOver) return;
  let anyDanger = false;
  for (const b of hedgehogBodies) {
    const top = b.position.y - TIERS[b.tier - 1].r;
    b._inDanger = (top < DANGER_Y);
    if (b._inDanger) anyDanger = true;
  }
  if (anyDanger) {
    dangerMs += dt;
    if (dangerMs >= DANGER_LIMIT) triggerGameOver();
  } else {
    dangerMs = 0;
  }
}

// ═══════════════════════════════════════════════════════════
// 게임 오버
// ═══════════════════════════════════════════════════════════
function triggerGameOver() {
  if (isGameOver) return;
  isGameOver = true;
  Runner.stop(runner);

  if (score > best) { best = score; localStorage.setItem('hedgehogMergeBest', best); }

  document.getElementById('modal-final-score').textContent = `최종 점수: ${score}`;
  document.getElementById('modal-best-score').textContent  = `최고 점수: ${best}`;
  document.getElementById('modal-new-best').style.display  = score >= best && best > 0 ? '' : 'none';
  goModal.classList.add('visible');
}

// ═══════════════════════════════════════════════════════════
// 리셋
// ═══════════════════════════════════════════════════════════
function resetGame() {
  for (const b of hedgehogBodies) World.remove(world, b);
  hedgehogBodies = []; pendingMerges = [];
  mergeRings = []; particles = []; scoreFloats = [];
  score = 0; dangerMs = 0;
  isGameOver = false; isDropping = false;
  cursorX = W / 2;
  currentTier = randTier();
  nextTier    = randTier();
  updateScore(); drawNextPreview();
  goModal.classList.remove('visible');
  Runner.run(runner, engine);
}

// ═══════════════════════════════════════════════════════════
// 시작
// ═══════════════════════════════════════════════════════════
function startGame() {
  if (gameStarted) return;
  gameStarted  = true;
  currentTier  = randTier();
  nextTier     = randTier();
  updateScore();
  drawNextPreview();
  startScr.classList.remove('visible');
}

// ═══════════════════════════════════════════════════════════
// 입력 이벤트
// ═══════════════════════════════════════════════════════════
// 마우스 이동 (X만 추적)
wrapper.addEventListener('mousemove', e => {
  if (!gameStarted || isGameOver) return;
  cursorX = clientToWorldX(e.clientX);
});

// 터치 이동
wrapper.addEventListener('touchmove', e => {
  if (!gameStarted || isGameOver) return;
  e.preventDefault();
  cursorX = clientToWorldX(e.changedTouches[0].clientX);
}, { passive: false });

// 클릭 → 드롭
wrapper.addEventListener('click', () => drop());

// 터치 → 드롭 (touchstart, passive false)
wrapper.addEventListener('touchstart', e => {
  e.preventDefault();
  cursorX = clientToWorldX(e.changedTouches[0].clientX);
  drop();
}, { passive: false });

// 스페이스바 → 드롭
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); drop(); }
  if (e.code === 'Enter' && isGameOver) resetGame();
});

// 시작 / 재시작 버튼
document.getElementById('start-btn').addEventListener('click',   startGame);
document.getElementById('restart-btn').addEventListener('click', resetGame);

// ═══════════════════════════════════════════════════════════
// afterRender — 메인 그리기 루프
// ═══════════════════════════════════════════════════════════
Events.on(render, 'afterRender', () => {
  if (!gameStarted) return;

  const ctx = render.context;
  const now = performance.now();
  const dt  = lastTs > 0 ? Math.min(now - lastTs, 50) : 0;
  lastTs    = now;

  // 합치기 처리
  processMerges();

  // 위험 판정
  checkDanger(dt);

  // ── 드롭 영역 배경 (상단 80px) ────────────────────────
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(0, 0, W, 82);
  ctx.restore();

  // ── 위험선 ─────────────────────────────────────────────
  const blinkAlpha = 0.35 + 0.35 * Math.sin(now / 500);
  ctx.save();
  ctx.strokeStyle = `rgba(220,80,80,${blinkAlpha})`;
  ctx.lineWidth   = 1;
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(0, DANGER_Y); ctx.lineTo(W, DANGER_Y);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.font        = '9px system-ui, sans-serif';
  ctx.fillStyle   = `rgba(220,80,80,${blinkAlpha})`;
  ctx.textAlign   = 'right';
  ctx.fillText('GAME OVER LINE', W - 6, DANGER_Y - 3);
  ctx.restore();

  // ── 쌓인 고슴도치 그리기 ───────────────────────────────
  for (const b of hedgehogBodies) drawBody(ctx, b, now);

  // ── 이펙트 (링 / 파티클 / 점수 플로트) ────────────────
  drawEffects(ctx, now);

  // ── 대기 고슴도치 + 조준선 ────────────────────────────
  if (!isDropping) {
    const tier = currentTier;
    const r    = TIERS[tier - 1].r;
    const x    = clampX(tier);
    const img  = getImg(tier);

    // 조준선 (점선, 연하게)
    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 7]);
    ctx.beginPath();
    ctx.moveTo(x, DROP_Y + r);
    ctx.lineTo(x, H);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // 대기 고슴도치
    ctx.save();
    ctx.translate(x, DROP_Y);
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, -r, -r, r*2, r*2);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI*2);
      ctx.fillStyle = '#E8B4A0';
      ctx.fill();
    }
    ctx.restore();
  }

  // ── 위험 타이머 경고 텍스트 (2초 이상일 때) ──────────
  if (dangerMs > 2000 && !isGameOver) {
    const remaining = ((DANGER_LIMIT - dangerMs) / 1000).toFixed(1);
    ctx.save();
    ctx.globalAlpha = 0.7 + 0.3 * Math.sin(now / 150);
    ctx.fillStyle   = 'rgba(220,80,80,0.85)';
    ctx.font        = 'bold 18px system-ui, sans-serif';
    ctx.textAlign   = 'center';
    ctx.fillText(`${remaining}`, W / 2, DANGER_Y - 14);
    ctx.restore();
  }
});

// ═══════════════════════════════════════════════════════════
// 초기화 실행
// ═══════════════════════════════════════════════════════════
(async () => {
  await preloadImages();
  bestEl.textContent = best;
  drawNextPreview();
})();
</script>
</body>
</html>
