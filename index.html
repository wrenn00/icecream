<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hedgehog Pile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FAFAFA;
    color: #2C2C2C;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #title {
    font-size: 14px;
    color: #888888;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  #canvas-wrapper {
    position: relative;
    width: 500px;
    height: 700px;
    flex-shrink: 0;
    box-shadow: 0 4px 24px rgba(0,0,0,0.04);
  }

  /* Matter.js 삽입 canvas */
  #canvas-wrapper canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    border: 1px solid #F0F0F0;
    background: #FFFFFF;
  }

  /* 하단 UI: 카운터 + 리셋 */
  #ui-bottom {
    position: absolute;
    right: 12px;
    bottom: 12px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    z-index: 10;
    pointer-events: none;
  }

  #counter {
    font-size: 12px;
    color: #BBBBBB;
    letter-spacing: 0.3px;
    transform-origin: right center;
    transition: transform 0.2s cubic-bezier(0.36, 1.56, 0.64, 1);
  }
  #counter.pop { transform: scale(1.3); }

  #reset-btn {
    font-size: 11px;
    color: #CCCCCC;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
    font-family: inherit;
    letter-spacing: 0.3px;
    pointer-events: auto;
    transition: color 0.15s;
  }
  #reset-btn:hover { color: #888888; }

  /* 반응형 */
  @media (max-width: 540px) {
    #canvas-wrapper { width: 100vw; height: calc(100vw * 1.4); }
    body { background: #FFFFFF; }
  }
  @media (max-height: 820px) {
    #canvas-wrapper {
      width: min(500px, 90vw);
      height: min(700px, calc(min(500px, 90vw) * 1.4));
    }
    #title { margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="title">Hedgehog Pile</div>

<div id="canvas-wrapper">
  <div id="ui-bottom">
    <div id="counter">쌓은 개수: 0</div>
    <button id="reset-btn">초기화</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════════════════
const W = 500, H = 700;
const WALL_T = 60, HOG_R = 40, WALL_H = 24000;

const IDLE_X       = W / 2;
const IDLE_Y_SCR   = 68;     // 화면 상단으로부터 idle 고슴도치까지 (screen px)
const IDLE_AMP_V   = 5;      // 위아래 진폭
const IDLE_AMP_H   = 3;      // 좌우 진폭
const IDLE_PERIOD_V = 2000;  // 위아래 주기 ms
const IDLE_PERIOD_H = 3000;  // 좌우 주기 ms

const STABLE_SPD = 0.10;     // 안정 판정 속도 임계값
const STABLE_MS  = 500;      // 안정 유지 시간
const CAM_LERP   = 0.05;     // 카메라 보간 계수
const CAM_PAD    = H * 0.40; // 최고점을 화면 40% 지점에 배치

// ═══════════════════════════════════════════════════════════
// Matter.js 셋업 (enableSleeping → 많이 쌓여도 성능 유지)
// ═══════════════════════════════════════════════════════════
const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

const wrapper   = document.getElementById('canvas-wrapper');
const counterEl = document.getElementById('counter');
const resetBtn  = document.getElementById('reset-btn');

const engine = Engine.create({ gravity: { y: 1 }, enableSleeping: true });
const world  = engine.world;

const render = Render.create({
  element: wrapper,
  engine:  engine,
  options: {
    width:      W,
    height:     H,
    background: '#FFFFFF',
    wireframes: false,
  }
});

// 경계 (정적, 영구)
const boundaries = [
  Bodies.rectangle(W/2, H+WALL_T/2, W+WALL_T*2, WALL_T,
    { isStatic:true, label:'ground', render:{fillStyle:'transparent'} }),
  Bodies.rectangle(-WALL_T/2, H/2-WALL_H/2, WALL_T, WALL_H,
    { isStatic:true, label:'wall-l', render:{fillStyle:'transparent'} }),
  Bodies.rectangle(W+WALL_T/2, H/2-WALL_H/2, WALL_T, WALL_H,
    { isStatic:true, label:'wall-r', render:{fillStyle:'transparent'} }),
];
World.add(world, boundaries);

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ═══════════════════════════════════════════════════════════
// 이미지 로드
// ═══════════════════════════════════════════════════════════
const hogImage = new Image();
hogImage.src = 'wh.png';
hogImage.onerror = () => console.warn('wh.png 로드 실패 — 폴백 원 사용');

// ═══════════════════════════════════════════════════════════
// 카메라
// ═══════════════════════════════════════════════════════════
// camY: 화면 최상단이 대응하는 world y 값 (0 이하)
let camY = 0, camTargetY = 0;

// ═══════════════════════════════════════════════════════════
// 좌표 변환
// ═══════════════════════════════════════════════════════════
// 마우스/터치 클라이언트 좌표 → world 좌표
function clientToWorld(clientX, clientY) {
  const rect = render.canvas.getBoundingClientRect();
  return {
    x: (clientX - rect.left) * (W / rect.width),
    y: (clientY - rect.top)  * (H / rect.height) + camY,
  };
}

// ═══════════════════════════════════════════════════════════
// 고슴도치 그리기 (screen 좌표 기준)
// ═══════════════════════════════════════════════════════════
function drawHedgehog(ctx, sx, sy, angle, r, alpha = 1, scale = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(sx, sy);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  if (hogImage.complete && hogImage.naturalWidth > 0) {
    ctx.drawImage(hogImage, -r, -r, r * 2, r * 2);
  } else {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#E8B4A0';
    ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 게임 상태
// ═══════════════════════════════════════════════════════════
const hedgehogs = []; // { body, stableTimer, counted }
let stableCount = 0;
let latestBody  = null;

let isDragging = false;
let isDropped  = false;
let dragX = IDLE_X, dragY = 0;  // world 좌표
let idleAlpha = 1;
let idleTime  = 0;
let lastTs    = 0;

// 첫 드롭 가이드 텍스트 alpha (처음 1→0 으로 fade)
let guideAlpha = 1;

// ── idle 고슴도치 화면 위치 (screen y 기준) ───────────────
function idleScreenX() {
  return IDLE_X + Math.sin((idleTime / IDLE_PERIOD_H) * Math.PI * 2) * IDLE_AMP_H;
}
function idleScreenY() {
  return IDLE_Y_SCR + Math.sin((idleTime / IDLE_PERIOD_V) * Math.PI * 2) * IDLE_AMP_V;
}
// idle 고슴도치 world y (카메라 반영)
function idleWorldY() { return camY + idleScreenY(); }

// ═══════════════════════════════════════════════════════════
// Hit test (world 좌표 입력)
// ═══════════════════════════════════════════════════════════
function hitIdle(wx, wy) {
  if (isDropped || isDragging) return false;
  return Math.hypot(wx - IDLE_X, wy - idleWorldY()) <= HOG_R * 1.2;
}

// ═══════════════════════════════════════════════════════════
// 충격파
// ═══════════════════════════════════════════════════════════
const pulses = []; // { wx, wy, startTs }
const PULSE_MS = 300, PULSE_MAXR = 60;

function spawnPulse(wx, wy) {
  pulses.push({ wx, wy, startTs: performance.now() });
}

function drawPulses(ctx, now) {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const t = (now - p.startTs) / PULSE_MS;
    if (t >= 1) { pulses.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = (1 - t) * 0.55;
    ctx.strokeStyle = '#E8B4A0';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.arc(p.wx, p.wy - camY, t * PULSE_MAXR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// 배경 가이드라인
// ═══════════════════════════════════════════════════════════
function drawGuideLines(ctx) {
  const step = 100;
  const firstLine = Math.floor(camY / step) * step;
  ctx.save();
  ctx.strokeStyle = '#F5F5F5';
  ctx.lineWidth   = 1;
  ctx.setLineDash([3, 6]);
  for (let wy = firstLine; wy <= camY + H + step; wy += step) {
    const sy = wy - camY;
    if (sy < -1 || sy > H + 1) continue;
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 드롭 → Body 생성
// ═══════════════════════════════════════════════════════════
let firstDrop = true;

function dropHedgehog(wx, wy) {
  const angle  = (Math.random() - 0.5) * 0.6;
  const angVel = (Math.random() - 0.5) * 0.1;

  const body = Bodies.circle(wx, wy, HOG_R, {
    restitution:    0.4,
    friction:       0.6,
    density:        0.002,
    sleepThreshold: 60,
    label:          'hedgehog',
    render:         { fillStyle:'transparent', strokeStyle:'transparent', lineWidth:0 },
    angle:          angle,
  });
  Body.setAngularVelocity(body, angVel);
  Body.setVelocity(body, { x: 0, y: 1 });

  World.add(world, body);
  hedgehogs.push({ body, stableTimer: 0, counted: false });
  latestBody = body;

  isDragging = false;
  isDropped  = true;

  // 가이드 텍스트 첫 드롭 시 fade out
  if (firstDrop) {
    firstDrop = false;
    if (guideAlpha > 0) {
      const t0 = performance.now();
      (function fadeGuide(ts) {
        guideAlpha = Math.max(0, 1 - (ts - t0) / 300);
        if (guideAlpha > 0) requestAnimationFrame(fadeGuide);
      })(performance.now());
    }
  }

  // 0.5초 후 대기 고슴도치 재등장 (fade in 200ms)
  setTimeout(() => {
    idleAlpha = 0;
    isDropped = false;
    const t0 = performance.now();
    (function fadeIn(ts) {
      idleAlpha = Math.min((ts - t0) / 200, 1);
      if (idleAlpha < 1) requestAnimationFrame(fadeIn);
    })(performance.now());
  }, 500);
}

// ═══════════════════════════════════════════════════════════
// 입력
// ═══════════════════════════════════════════════════════════
const canvas = render.canvas;

// ── 마우스 ────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (isDropped) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x; dragY = y;
    canvas.style.cursor = 'grabbing';
  }
});

canvas.addEventListener('mousemove', e => {
  if (isDragging || isDropped) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  canvas.style.cursor = hitIdle(x, y) ? 'grab' : 'default';
});

canvas.addEventListener('mouseleave', () => {
  if (!isDragging) canvas.style.cursor = 'default';
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dragX = x; dragY = y;
});

window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dropHedgehog(x, y);
  canvas.style.cursor = 'default';
});

// ── 터치 ──────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  if (isDropped) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x; dragY = y;
  }
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dragX = x; dragY = y;
}, { passive: false });

window.addEventListener('touchend', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dropHedgehog(x, y);
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// 충돌 → 충격파 + 미세 흔들림
// ═══════════════════════════════════════════════════════════
Events.on(engine, 'collisionStart', event => {
  for (const { bodyA, bodyB } of event.pairs) {
    if (bodyA !== latestBody && bodyB !== latestBody) continue;
    const cx = (bodyA.position.x + bodyB.position.x) / 2;
    const cy = (bodyA.position.y + bodyB.position.y) / 2;
    spawnPulse(cx, cy);
    const other = bodyA === latestBody ? bodyB : bodyA;
    if (!other.isStatic) {
      Body.applyForce(other, other.position, {
        x: (Math.random() - 0.5) * 0.002,
        y: (Math.random() - 0.5) * 0.001,
      });
    }
  }
});

// ═══════════════════════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════════════════════
function resetAll() {
  for (const { body } of hedgehogs) World.remove(world, body);
  hedgehogs.length = 0;
  pulses.length    = 0;
  stableCount      = 0;
  counterEl.textContent = '쌓은 개수: 0';
  camY = 0; camTargetY = 0;
  latestBody  = null;
  isDragging  = false;
  isDropped   = false;
  idleAlpha   = 1;
  idleTime    = 0;
}
resetBtn.addEventListener('click', resetAll);

// ═══════════════════════════════════════════════════════════
// afterRender — 메인 그리기 루프
// ═══════════════════════════════════════════════════════════
Events.on(render, 'afterRender', () => {
  const ctx = render.context;
  const now = performance.now();
  const dt  = lastTs > 0 ? Math.min(now - lastTs, 50) : 0;
  lastTs    = now;

  // idle 타이머
  if (!isDropped && !isDragging) idleTime += dt;

  // ── 카메라 업데이트 ──────────────────────────────────────
  if (hedgehogs.length > 0) {
    let highestY = H;
    for (const { body } of hedgehogs) {
      if (body.position.y < highestY) highestY = body.position.y;
    }
    camTargetY = Math.min(0, highestY - CAM_PAD);
  } else {
    camTargetY = 0;
  }
  camY += (camTargetY - camY) * CAM_LERP;

  // ── 안정도 체크 → 카운터 ────────────────────────────────
  for (const entry of hedgehogs) {
    if (entry.counted) continue;
    const spd = Math.hypot(entry.body.velocity.x, entry.body.velocity.y);
    const asp = Math.abs(entry.body.angularVelocity);
    if (spd < STABLE_SPD && asp < STABLE_SPD * 0.5) {
      entry.stableTimer += dt;
      if (entry.stableTimer >= STABLE_MS) {
        entry.counted = true;
        stableCount++;
        counterEl.textContent = `쌓은 개수: ${stableCount}`;
        // 카운터 팝 애니메이션
        counterEl.classList.remove('pop');
        void counterEl.offsetWidth;
        counterEl.classList.add('pop');
        setTimeout(() => counterEl.classList.remove('pop'), 200);
      }
    } else {
      entry.stableTimer = 0;
    }
  }

  // ── 가이드라인 ───────────────────────────────────────────
  drawGuideLines(ctx);

  // ── 떨어진 고슴도치 (world → screen 변환: sy = worldY - camY) ──
  for (const { body } of hedgehogs) {
    drawHedgehog(ctx, body.position.x, body.position.y - camY, body.angle, HOG_R);
  }

  // ── 충격파 ──────────────────────────────────────────────
  drawPulses(ctx, now);

  // ── 대기 / 드래그 고슴도치 ──────────────────────────────
  if (!isDropped) {
    if (isDragging) {
      // 드래그: world → screen
      ctx.save();
      ctx.shadowColor   = 'rgba(0,0,0,0.10)';
      ctx.shadowBlur    = 18;
      ctx.shadowOffsetY = 7;
      drawHedgehog(ctx, dragX, dragY - camY, 0, HOG_R, idleAlpha, 1.05);
      ctx.restore();
    } else {
      // idle: 화면 고정 위치
      const isx = idleScreenX();
      const isy = idleScreenY();
      drawHedgehog(ctx, isx, isy, 0, HOG_R, idleAlpha, 1.0);

      // grab 힌트 점선 링
      if (idleAlpha > 0.4) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(isx, isy, HOG_R + 5, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(232,180,160,0.38)';
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([4, 6]);
        ctx.globalAlpha = idleAlpha;
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // 가이드 텍스트 (첫 드롭 전)
      if (guideAlpha > 0) {
        ctx.save();
        ctx.globalAlpha   = guideAlpha * idleAlpha;
        ctx.fillStyle     = '#AAAAAA';
        ctx.font          = '13px system-ui,-apple-system,sans-serif';
        ctx.textAlign     = 'left';
        ctx.textBaseline  = 'middle';
        ctx.fillText('드래그해서 놓아주세요', isx + HOG_R + 10, isy);
        ctx.restore();
      }
    }
  }
});
</script>
</body>
</html>
